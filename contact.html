<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkweekyClean Services</title>
<link rel="stylesheet" href="css/style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>


<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
</nav>

<h2 class="page-title">Contact Us and Enquire</h2>

<main>
<div class="contact-container">

    <form id="contact-form" class="contact-form" onsubmit="return sendMail(event)">

        <input type="text" id="name" name="name" placeholder="Your Name">
        <input type="email" id="email" name="email" placeholder="Your Email">
        <input type="tel" id="phone" name="phone" placeholder="Your Phone Number">
        <textarea id="message" name="message" placeholder="Your Message"></textarea>
        <button type="submit" id="submit-btn">Send Message</button>

    </form>

</div>

<div class="map-container">
    <h2>Find Us</h2>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3309.6891405262063!2d25.575779574846973!3d-33.94912257319591!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e7ad233dd42453b%3A0xdc142ec7bc172939!2sGreenacres%20Shopping%20Centre!5e0!3m2!1sen!2sza!4v1781777747299!5m2!1sen!2sza" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>
    

</main>

<footer>
     <h2>Our Info</h2>
    <p><strong>Phone:</strong> 075 622 6236</p>
    <p><strong>Email:</strong> info@skweekyclean.co.za</p>
    <p><strong>Location:</strong> Port Elizabeth, South Africa</p>
    <p>&copy; 2026 SkweekyClean Services</p>
</footer>

<script>
    // Initialize EmailJS
    emailjs.init({
        publicKey: "mbD_tQOnc0gz0ko6N"
    });

    function sendMail(event) {
        event.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const message = document.getElementById("message").value.trim();

        // Validation
        if (name === "" || name.length < 2) {
            alert("Please enter a valid name.");
            return false;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert("Please enter a valid email address.");
            return false;
        }

        const phoneRegex = /^[0-9+\-\s()]+$/;
        const digitsOnly = phone.replace(/\D/g, "");

        if (!phoneRegex.test(phone) || digitsOnly.length < 10) {
            alert("Please enter a valid phone number.");
            return false;
        }

        if (message.length < 10) {
            alert("Message must contain at least 10 characters.");
            return false;
        }

        const submitBtn = document.getElementById("submit-btn");
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending...";

        const templateParams = {
            name: name,
            email: email,
            phone: phone,
            message: message
        };

        emailjs.send(
            "service_2tpdk1q",
            "template_mm3n8sk",
            templateParams
        )
        .then(function () {
            alert("Thank you! Your message has been sent successfully.");
            document.getElementById("contact-form").reset();

            submitBtn.disabled = false;
            submitBtn.textContent = "Send Message";
        })
        .catch(function (error) {
            console.error("EmailJS Error:", error);

            alert("Failed to send message. Please try again later.");

            submitBtn.disabled = false;
            submitBtn.textContent = "Send Message";
        });

        return false;
    }
</script>
</body>
</html>
