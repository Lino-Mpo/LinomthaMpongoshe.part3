<main>
<h2 class="gallery-title">Our Work</h2>

<div class="gallery">

    <div class="gallery-item">
        <img src="images/bandahome.jpg" alt="Home Cleaning" onclick="openModal(this.src)">
        <p>Home Cleaning</p>
    </div>

    <div class="gallery-item">
        <img src="images/bandaoffice.jpg" alt="Office Cleaning" onclick="openModal(this.src)">
        <p>Office Cleaning</p>
    </div>

    <div class="gallery-item">

</div>

<footer>
     <h2>Our Info</h2>

<!-- Image Popup -->
<div id="imageModal" class="modal" onclick="closeModal()">
    <img id="modalImage" class="modal-content" alt="Gallery Image">
</div>

<script>
function openModal(imageSrc) {
    document.getElementById("modalImage").src = imageSrc;
    document.getElementById("imageModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("imageModal").style.display = "none";
}
</script>
